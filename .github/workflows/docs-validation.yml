name: Documentation Validation

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "docs/**"
      - "examples/**"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - "docs/**"
      - "examples/**"
  workflow_dispatch:

concurrency:
  group: docs-validation-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyyaml

      - name: Download AFDS validator
        run: |
          curl -sSfL -o docs_validate.py \
            https://raw.githubusercontent.com/paulomac1000/ai-skills/main/skills/afds-doc-writer/docs_validate.py
          chmod +x docs_validate.py

      - name: Get changed markdown files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **/*.md
            docs/**
            examples/**
          files_ignore: |
            **/archive/**
            README.md

      - name: Validate documentation (changed files only)
        id: validate
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          echo "Changed files: $CHANGED_FILES"
          python3 docs_validate.py \
            --ci \
            --config .github/afds_config.yaml \
            --strict \
            2>&1 | tee /tmp/docs-validation-output.txt
          EXIT_CODE=${PIPESTATUS[0]}

          if [ $EXIT_CODE -ne 0 ]; then
            echo "FAIL: Documentation validation failed"
            exit $EXIT_CODE
          fi
          echo "PASS: Documentation validation passed"

      - name: Validate documentation (all files, no changes)
        if: steps.changed-files.outputs.any_changed != 'true'
        run: |
          echo "No markdown files changed — validating all documents"
          python3 docs_validate.py \
            docs/ \
            --config .github/afds_config.yaml \
            --strict \
            || true
          echo "PASS: Documentation validation completed"

      - name: Post or update PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const marker = '<!-- docs-validation-bot -->';
            const issue_number = context.issue.number;
            const commit = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const jobStatus = '${{ job.status }}';

            let body;
            if (jobStatus === 'success') {
              body = [
                marker,
                '## ✅ Documentation Validation Passed',
                '',
                `**Commit:** \`${commit}\``,
                '**Checked:** AFDS frontmatter, metadata, formatting, banned words',
              ].join('\n');
            } else {
              let failureDetails = '';
              try {
                const raw = fs.readFileSync('/tmp/docs-validation-output.txt', 'utf8').trim();
                if (raw) failureDetails = '\n<details><summary>Validation output</summary>\n\n```\n' + raw.slice(-2000) + '\n```\n</details>\n';
              } catch (_) {}

              body = [
                marker,
                '## ❌ Documentation Validation Failed',
                '',
                `**Commit:** \`${commit}\``,
                failureDetails,
                `**Full logs:** ${runUrl}`,
                '',
                '**How to fix locally:**',
                '```bash',
                'pip install pyyaml',
                'python3 docs_validate.py docs/ --strict --config .github/afds_config.yaml',
                '```',
              ].join('\n');
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(
              c => c.user.login === 'github-actions[bot]' && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
